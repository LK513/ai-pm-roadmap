<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-PM 转型路线图</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h1 class="sidebar__title" id="north-star-quote">…</h1>
      <p class="sidebar__subtitle" id="north-star-milestone">…</p>

      <div class="sidebar__meta">
        <span class="sidebar__chip"><strong id="current-quarter">…</strong> <span id="current-theme">…</span></span>
        <span class="sidebar__chip sidebar__chip--countdown">距年底 <strong id="days-remaining">…</strong> 天</span>
      </div>

      <div class="sidebar__section-label">路线进度</div>
      <div class="sidebar__phases" id="phases-list"></div>

      <div class="sidebar__spacer"></div>

      <nav class="sidebar__actions">
        <span class="sidebar__actions-label">快速记录</span>
        <a class="qa-btn qa-btn--reflect" href="" id="btn-reflect" target="_blank" rel="noopener">
          <span class="qa-btn__icon">💭</span> 反思
        </a>
        <a class="qa-btn qa-btn--idea" href="" id="btn-idea" target="_blank" rel="noopener">
          <span class="qa-btn__icon">💡</span> 灵感
        </a>
        <a class="qa-btn qa-btn--resource" href="" id="btn-resource" target="_blank" rel="noopener">
          <span class="qa-btn__icon">📚</span> 资源
        </a>
        <a class="qa-btn qa-btn--blocker" href="" id="btn-blocker" target="_blank" rel="noopener">
          <span class="qa-btn__icon">🚧</span> 卡壳
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Tasks -->
      <section class="card card--tasks">
        <div class="card__header">
          <h2 class="card__title">本周任务</h2>
          <span class="card__badge card__badge--green" id="week-of"></span>
        </div>
        <ul class="task-list" id="tasks-list"></ul>
        <div class="task-add" id="task-add-area"></div>
      </section>

      <!-- Frontier -->
      <section class="card card--frontier">
        <div class="card__header">
          <h2 class="card__title">AI 前沿</h2>
          <span class="card__badge" id="frontier-badge"></span>
        </div>
        <div class="frontier-grid" id="frontier-list"></div>
        <div class="frontier-footer" id="frontier-action"></div>
      </section>

      <!-- Reflections -->
      <section class="card card--reflection">
        <div class="card__header">
          <h2 class="card__title">近期反思</h2>
        </div>
        <div class="reflections" id="reflections-list"></div>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <span>更新: <span id="last-update">…</span></span>
        <span class="footer__dot">·</span>
        <a id="repo-link" href="" target="_blank" rel="noopener">仓库</a>
        <span class="footer__dot">·</span>
        <a id="issues-link" href="" target="_blank" rel="noopener">反馈</a>
      </footer>
    </main>

    <!-- Error -->
    <div id="error-banner" class="error-banner hidden">
      <h2>数据加载失败</h2>
      <pre id="error-message"></pre>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
