<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重生之我要当AI-PM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Hero: centered title + milestone -->
    <header class="hero">
      <h1 class="hero__title" id="north-star-quote">…</h1>
      <p class="hero__milestone" id="north-star-milestone">…</p>
    </header>

    <!-- Timeline: horizontal progress bar -->
    <section class="timeline" id="timeline"></section>

    <!-- Countdown: days left in current phase -->
    <div class="countdown" id="countdown-area"></div>

    <!-- Quick Actions -->
    <nav class="actions" aria-label="快速记录">
      <a class="action action--reflect" href="" id="btn-reflect" target="_blank" rel="noopener">
        <span class="action__icon">💭</span><span class="action__label">反思</span>
      </a>
      <a class="action action--idea" href="" id="btn-idea" target="_blank" rel="noopener">
        <span class="action__icon">💡</span><span class="action__label">灵感</span>
      </a>
      <a class="action action--resource" href="" id="btn-resource" target="_blank" rel="noopener">
        <span class="action__icon">📚</span><span class="action__label">资源</span>
      </a>
      <a class="action action--blocker" href="" id="btn-blocker" target="_blank" rel="noopener">
        <span class="action__icon">🚧</span><span class="action__label">卡壳</span>
      </a>
    </nav>

    <!-- Main Content -->
    <main class="content">

      <!-- Tasks -->
      <section class="card card--tasks">
        <div class="card__head">
          <h2 class="card__title">本周任务</h2>
          <span class="card__tag card__tag--green" id="week-of"></span>
        </div>
        <ul class="task-list" id="tasks-list"></ul>
        <div class="task-add" id="task-add-area"></div>
      </section>

      <!-- Two columns: Frontier + Reflections -->
      <div class="grid-2">
        <!-- Frontier -->
        <section class="card card--frontier">
          <div class="card__head">
            <h2 class="card__title">AI 前沿</h2>
            <span class="card__tag" id="frontier-badge"></span>
          </div>
          <div class="frontier-list" id="frontier-list"></div>
          <div class="frontier-footer" id="frontier-action"></div>
        </section>

        <!-- Reflections -->
        <section class="card card--reflection">
          <div class="card__head">
            <h2 class="card__title">近期反思</h2>
          </div>
          <div class="reflections" id="reflections-list"></div>
        </section>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <span>更新: <span id="last-update">…</span></span>
        <span class="footer__dot">·</span>
        <a id="repo-link" href="" target="_blank" rel="noopener">仓库</a>
        <span class="footer__dot">·</span>
        <a id="issues-link" href="" target="_blank" rel="noopener">反馈</a>
      </footer>
    </main>

    <div id="error-banner" class="error-banner hidden">
      <h2>数据加载失败</h2>
      <pre id="error-message"></pre>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
